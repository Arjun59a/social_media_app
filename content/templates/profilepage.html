{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>
<body>

<div class="profile-card">

    {% if profile.profilepic %}
        <img class="profile-pic" src="{{ profile.profilepic.url }}">
    {% else %}
        <div class="profile-pic placeholder">
            👤
        </div>
    {% endif %}

    <h2>{{ username }}</h2>

    <!-- Followers & Following -->
    <form method="POST">
        {% csrf_token %}

        <button class="connection-btn"
                type="submit"
                name="type"
                value="followers">
            Followers
        </button>

        <button class="connection-btn"
                type="submit"
                name="type"
                value="following">
            Following
        </button>
    </form>

    <br>

    <!-- Profile Update Form -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="file" name="image">

        <textarea
            name="bio"
            placeholder="Write something about yourself...">{{ profile.bio }}</textarea>

        <button class="save-btn" type="submit">
            Save Profile
        </button>

    </form>

</div>

<h2 class="heading">My Posts</h2>

<div class="post-grid">

{% for psts in posts %}

<div class="post-box">
    <img src="{{ psts.image.url }}">
</div>

{% empty %}

<h3 style="text-align:center;">No posts yet.</h3>

{% endfor %}

</div>

</body>
</html>
