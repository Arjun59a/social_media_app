<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello this is a Comment Section where you can add your faltu comments </h1>

    {% for i in commt_obj %}
    <p>{{i.comment}}</p>
    {% endfor %}
    <form action="{% url 'home_app:addcommt' postid %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <textarea name="comment" ></textarea>
        <button type="submit">Add comment</button>
    </form>
</body>
</html>
