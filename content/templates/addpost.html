{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/form.css' %}">
</head>
<body>
    <form  action="{% url 'home_app:Getpost' username %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="input-box">
        <label>Post Image</label>
        <input type="file" name="image" accept="image/*" required>
    </div>

    <div class="input-box">
        <label>Title</label>
        <input
            type="text"
            name="title"
            placeholder="Enter post title"
            required
        >
    </div>

    <div class="input-box">
        <label>Description</label>
        <textarea
            name="description"
            rows="8"
            placeholder="Write something..."
            required
        ></textarea>
    </div>

    <button type="submit">
        Publish Post
    </button>

</form>
</body>
</html>
